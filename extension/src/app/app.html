<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Runtime</title>
  </head>
  <body class="chat-body">
    <div id="codingView" class="shell-view">
    <div class="chat-shell" id="chatShell">
      <div class="chat-app">
        <header class="chat-header">
          <div class="header-left">
            <h1 class="page-title" id="pageTitle">加载中...</h1>
            <p class="subtitle page-url" id="pageUrl">加载中...</p>
            <p class="subtitle" id="connectionStatus">就绪</p>
          </div>
          <div class="header-actions">
            <button id="refreshPageBtn" class="icon-btn" type="button" title="刷新">⟳</button>
            <button id="tapdBatchBtn" class="icon-btn" type="button" title="TAPD 任务" aria-label="TAPD 任务">
              <svg width="17" height="17" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M9 6h11M9 12h11M9 18h11" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                <path d="M4 6l1.2 1.2L7.5 4.8M4 12l1.2 1.2L7.5 10.8M4 18l1.2 1.2L7.5 16.8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </button>
            <button id="settingsBtn" class="icon-btn" type="button" title="设置">⚙</button>
          </div>
        </header>

        <main class="chat-main" id="chatMain">
          <div class="chat-messages" id="chatMessages"></div>
        </main>

        <footer class="chat-footer" id="chatFooter">
          <div class="footer-resizer" id="footerResizer" title="拖动调整输入区高度"></div>
          <div class="chat-footer-body">
            <label class="checkbox compact">
              <input type="checkbox" id="usePlanMode" checked />
              先 Plan（读仓库出方案），确认后再执行改代码
            </label>
            <div class="composer" id="composer">
              <div class="composer-input">
                <div class="attachment-strip" id="attachmentStrip" hidden></div>
                <textarea
                  id="prompt"
                  rows="1"
                  placeholder="描述要修改的内容；可粘贴或拖拽截图（最多 3 张）"
                ></textarea>
              </div>
              <button id="submitBtn" class="primary send-btn" type="button">发送</button>
            </div>
          </div>
        </footer>
      </div>

      <div class="task-drawer-aside">
        <div
          id="taskDrawerResizer"
          class="task-drawer-resizer"
          role="separator"
          aria-orientation="vertical"
          aria-label="调整任务面板宽度"
          tabindex="0"
        ></div>
        <aside class="task-drawer" id="taskDrawer" aria-hidden="true">
          <div class="task-drawer-header">
            <h2 class="task-drawer-title">任务历史</h2>
          </div>
          <div class="task-drawer-body" id="taskDrawerList"></div>
        </aside>
        <button
          id="taskDrawerToggle"
          class="task-drawer-handle"
          type="button"
          title="任务历史"
          aria-expanded="false"
          aria-controls="taskDrawer"
        >
          <span class="task-drawer-tab">
            <svg class="task-drawer-chevron" width="10" height="10" viewBox="0 0 10 10" aria-hidden="true">
              <path d="M6.5 2L3 5l3.5 3" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </span>
        </button>
      </div>
    </div>
    </div>

    <div id="tapdBatchPanel" class="shell-view" hidden>
      <div class="batch-app">
        <header class="batch-header">
          <button class="batch-back" id="backToCodingBtn" type="button">← 编码模式</button>
          <div class="batch-header-main">
            <div class="batch-title-row">
              <h1>TAPD 任务</h1>
              <p class="batch-title-hint">
                拉取标题以 <strong>AI</strong> 开头的任务或缺陷，串行执行 Plan → 确认 → 执行 → 合并。
              </p>
            </div>
            <p class="batch-status" id="batchStatus">就绪</p>
          </div>
          <button id="batchRefreshBtn" class="icon-btn" type="button" title="刷新">⟳</button>
        </header>

        <main class="batch-main">
          <section class="batch-toolbar">
            <label class="batch-field">
              <span>迭代</span>
              <select id="iterationSelect">
                <option value="">加载中…</option>
              </select>
            </label>
            <div class="batch-load-actions">
              <button id="loadTasksBtn" class="batch-secondary" type="button">加载 AI 任务</button>
              <button id="loadBugsBtn" class="batch-secondary" type="button">加载 AI BUG</button>
            </div>
          </section>

          <div class="batch-workbench">
            <section class="batch-card batch-task-panel">
              <div class="batch-card-head">
                <div>
                  <h2>勾选任务 / BUG</h2>
                  <p class="batch-card-subtitle" id="taskSelectionSummary">未选择任务</p>
                </div>
                <div class="batch-card-actions">
                  <button id="selectPendingBtn" class="batch-link-btn" type="button">全选未完成</button>
                  <button id="clearSelectionBtn" class="batch-link-btn" type="button">清空勾选</button>
                </div>
              </div>
              <div id="taskPickerList" class="batch-task-list">
                <p class="batch-empty">请先选择迭代并加载任务或 BUG</p>
              </div>
              <div
                class="batch-workbench-resizer"
                id="batchWorkbenchResizer"
                role="separator"
                aria-orientation="vertical"
                aria-label="调整任务列表宽度"
                tabindex="0"
              ></div>
            </section>

            <aside class="batch-side-panel">
              <section class="batch-card" id="queueSection" hidden>
                <div class="batch-card-head">
                  <h2>执行队列</h2>
                </div>
                <div id="queueList" class="batch-queue-list"></div>
              </section>

              <section class="batch-card" id="progressSection" hidden>
                <div class="batch-card-head">
                  <h2>当前任务进度</h2>
                  <div class="batch-card-actions batch-run-actions">
                    <button id="confirmMergeBtn" class="batch-primary batch-compact-action" type="button" hidden>合并到 test</button>
                    <button id="discardMergeBtn" class="batch-secondary batch-compact-action" type="button" hidden>放弃合并</button>
                    <button id="pauseBatchBtn" class="batch-secondary batch-compact-action" type="button" hidden>暂停</button>
                    <button id="retryBatchBtn" class="batch-secondary batch-compact-action" type="button" hidden>重试当前</button>
                    <button id="skipBatchBtn" class="batch-secondary batch-compact-action" type="button" hidden>跳过并继续</button>
                    <button id="cancelBatchBtn" class="batch-danger batch-compact-action" type="button" hidden>终止</button>
                  </div>
                </div>
                <div id="jobProgressLog" class="batch-progress-log chat-messages"></div>
              </section>

              <section class="batch-side-empty" id="batchSideEmpty">
                <h2>执行状态</h2>
                <p>开始批量任务后，这里会显示执行队列和当前任务进度。</p>
              </section>
            </aside>
          </div>
        </main>

        <footer class="batch-footer">
          <div class="batch-footer-summary" id="batchFooterSummary">已选 0 个</div>
          <button id="startBatchBtn" class="batch-primary" type="button" disabled>开始执行</button>
        </footer>
      </div>
    </div>

    <div id="tapdResetConfirmModal" class="page-confirm-modal" hidden>
      <div class="page-confirm-backdrop" id="tapdResetConfirmBackdrop"></div>
      <div class="page-confirm-dialog" role="dialog" aria-labelledby="tapdResetConfirmHeading">
        <h2 id="tapdResetConfirmHeading" class="page-confirm-heading">确认刷新</h2>
        <p class="page-confirm-lead">将终止进行中的任务并清空当前页面状态，回到初始界面。</p>
        <div class="page-confirm-actions">
          <button id="tapdResetConfirmCancel" class="secondary" type="button">取消</button>
          <button id="tapdResetConfirmOk" class="primary" type="button">确认刷新</button>
        </div>
      </div>
    </div>

    <div id="pageConfirmModal" class="page-confirm-modal" hidden>
      <div class="page-confirm-backdrop" id="pageConfirmBackdrop"></div>
      <div class="page-confirm-dialog" role="dialog" aria-labelledby="pageConfirmHeading">
        <h2 id="pageConfirmHeading" class="page-confirm-heading">确认当前页面</h2>
        <p class="page-confirm-lead">发送前请确认浏览器中打开的是要修改的页面：</p>
        <div class="page-confirm-page">
          <div id="pageConfirmTitle" class="page-confirm-title"></div>
          <div id="pageConfirmUrl" class="page-confirm-url"></div>
        </div>
        <p id="pageConfirmHint" class="page-confirm-hint"></p>
        <div class="page-confirm-actions">
          <button id="pageConfirmCancel" class="secondary" type="button">取消</button>
          <button id="pageConfirmOk" class="primary" type="button">确认并发送</button>
        </div>
      </div>
    </div>
    <script type="module" src="./app.ts"></script>
  </body>
</html>
